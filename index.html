---
layout: default
---

<div class="slidesow">
  <a href="/fish-in-the-sea/"><img class="mySlides" src="http://www.danaamundsen.com/portfolio/louisville_mag/fish.png"></a>
  <a href="/sledding/"><img class="mySlides" src="http://www.danaamundsen.com/portfolio/louisville_mag/sledding.png"></a>
  <a href="/forest-of-the-unicorn/"><img class="mySlides" src="http://www.danaamundsen.com/portfolio/comics/tall_tales/fantasy_anthology.png"></a>
  <a href="/pip-and-maus/""><img class="mySlides" src="http://www.danaamundsen.com/portfolio/client/pip_maus/pip_and_maus.png"></a>

<div class="w3-center w3-container w3-section w3-large w3-text-white w3-display-bottommiddle" style="width:100%">
    <div class="w3-left w3-hover-text-khaki" onclick="plusDivs(-1)">&#10094;</div>
    <div class="w3-right w3-hover-text-khaki" onclick="plusDivs(1)">&#10095;</div>
    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(1)"></span>
    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(2)"></span>
    <span class="w3-badge demo w3-border w3-transparent w3-hover-white" onclick="currentDiv(3)"></span>
  </div>
</div>

{% for tag in site.tags %}
    <h2 id="{{ tag[0] | slugify }}">{{ tag[0] }}</h2>
	  <div class="container">
      {% for post in tag[1] %}

      <div class="post">
	<img src="{{ post.image }}" class="post_image">
	<div class="post_hover">
	<div class="post_desc"><p><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a><br>{{ post.desc }}</p></div>
	</div>
	      </div>
      {% endfor %}
	  </div>
    {% endfor %}

                                                                                                                                              
<script>
var slideIndex = 1;
showDivs(slideIndex);

function plusDivs(n) {
  showDivs(slideIndex += n);
}

function currentDiv(n) {
  showDivs(slideIndex = n);
}

function showDivs(n) {
  var i;
  var x = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  if (n > x.length) {slideIndex = 1}
  if (n < 1) {slideIndex = x.length}
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";  
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" w3-white", "");
  }
  x[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " w3-white";
}
</script>
